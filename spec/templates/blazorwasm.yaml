template:
  id: "blazorwasm"
  displayName: "Blazor WebAssembly"
  category: "Web"
  cli:
    command: "dotnet new blazorwasm"
    args:
      - name: "framework"
        flag: "--framework"
        required: true
      - name: "name"
        flag: "--name"
        required: true
  parameters:
    projectName:
      type: string
      required: true
    framework:
      type: enum
      values: ["net7.0", "net8.0", "net9.0", "net10.0"]
      default: "net8.0"
    hosted:
      type: boolean
      default: false
    pwa:
      type: boolean
      default: false
    createSolution:
      type: boolean
      default: true
    gitMode:
      type: enum
      values: ["local", "github", "remote", "none"]
      default: "local"
  postProcessing:
    - action: "createSolution"
      enabledIf: createSolution == true
    - action: "initializeGit"
      mode: gitMode
